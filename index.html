<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vegan Velociraptor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { width:100%; height:100%; overflow:hidden; background:#1a1a2e;
  display:flex; align-items:center; justify-content:center; }
canvas { display:block; border:3px solid #4ecdc4; border-radius:8px; }
/* Avviso modalità verticale su mobile */
#rot { display:none; position:fixed; inset:0; background:#1a1a2e; color:white;
  font:bold 20px sans-serif; flex-direction:column; align-items:center;
  justify-content:center; text-align:center; gap:16px; z-index:99; }
@media (orientation:portrait) and (max-width:768px) { #rot { display:flex; } }
#mute-btn {
  position:fixed; top:10px; right:14px; z-index:200;
  background:rgba(0,0,0,0.55); color:white; border:1.5px solid rgba(255,255,255,0.5);
  border-radius:8px; padding:5px 12px; font-size:18px; cursor:pointer;
  font-family:sans-serif; line-height:1; user-select:none;
  transition: background 0.15s;
}
#mute-btn:hover { background:rgba(0,0,0,0.8); }
</style>
</head>
<body>
<div id="rot">
  <div style="font-size:52px">📱↔️</div>
  <div>Ruota il telefono<br>per giocare!</div>
</div>
<canvas id="c"></canvas>
<button id="mute-btn" title="Mute/Unmute">🔊</button>
<script>
const c = document.getElementById('c'), cx = c.getContext('2d');
c.width = 800; c.height = 400;

// --- Adatta canvas allo schermo mantenendo risoluzione interna 800×400 ---
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw / 800, vh / 400);
  c.style.width  = Math.floor(800 * scale) + 'px';
  c.style.height = Math.floor(400 * scale) + 'px';
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 150));
resize();

// --- Costanti fisiche ---
const GND = 340;   // y suolo
const PH  = 55;    // altezza raptor in piedi
const PW  = 45;    // larghezza raptor
const DH  = 28;    // altezza raptor abbassato
const GRAVITY = 0.7;
const JUMP_VY = -14;
const SPD_MIN  = 3.5;   // velocità minima (mai scende sotto)
const MAX_LIVES = 5;    // vite massime

// --- Stato gioco ---
let state = 'menu';   // menu | play | lvlend | gameover
let score, lives, level, spd, spdMod, frame, levelScore, levelTimer;
// spdMod: modificatore accumulato (+per ogni vita persa, -per ogni verdura)
let hiScore = +localStorage.getItem('vegaRapHi') || 0;
let objs = [], coins = [], msg = null, msgTimer = 0;
let bgX = 0;
let nextObj, nextVeg;

// ===== 🎵 8-BIT AUDIO ENGINE =====
const VVAudio = (() => {
  let _ctx = null, _master = null;
  let muted = false, themeTimer = null, themeActive = false, _bpm = 165;

  const N = {
    Bb2:116.54,
    C3:130.81, Db3:138.59, Eb3:155.56, F3:174.61, Gb3:185.00,
    G3:196.00,  Ab3:207.65, A3:220.00,  Bb3:233.08, B3:246.94,
    C4:261.63,  Db4:277.18, D4:293.66,  Eb4:311.13, E4:329.63,
    F4:349.23,  G4:392.00,  Ab4:415.30, A4:440.00,  Bb4:466.16, B4:493.88,
    C5:523.25,  D5:587.33,  E5:659.25,  F5:698.46,
    G5:783.99,  A5:880.00,  Bb5:932.33, C6:1046.50,
    R:0
  };

  function _ac() {
    if (!_ctx) {
      _ctx = new (window.AudioContext || window.webkitAudioContext)();
      _master = _ctx.createGain();
      _master.gain.value = muted ? 0 : 0.28;
      _master.connect(_ctx.destination);
    }
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  }

  function _tone(f, t, dur, vol, wave) {
    if (!f) return;
    const a = _ac();
    const o = a.createOscillator(), g = a.createGain();
    o.type = wave || 'square';
    o.frequency.value = f;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, Math.max(t + 0.001, t + dur * 0.9));
    o.connect(g); g.connect(_master);
    o.start(t); o.stop(t + dur + 0.05);
  }

  // Schedule sequence, returns total duration in seconds.
  // beatLen=1 → durations are already in seconds; beatLen=60/bpm → beats
  function _seq(notes, t0, beatLen, vol, wave) {
    let t = t0, total = 0;
    for (const [f, b] of notes) {
      const d = b * beatLen;
      _tone(f, t, d * 0.88, vol, wave);
      t += d; total += d;
    }
    return total;
  }

  // --- Main theme: frantic 8-bit chiptune originale (C major, 32 beats) ---
  const MEL = [
    [N.C5,1],[N.E5,1],[N.G5,2],
    [N.A5,1],[N.G5,1],[N.F5,2],
    [N.E5,1],[N.G5,1],[N.C5,2],
    [N.D5,1],[N.F5,1],[N.G5,2],
    [N.C6,2],[N.Bb5,2],
    [N.A5,1],[N.G5,1],[N.F5,2],
    [N.E5,1],[N.D5,1],[N.E5,1],[N.F5,1],
    [N.C5,4],
  ];
  const BAS = [
    [N.C3,2],[N.C3,2],[N.F3,2],[N.G3,2],
    [N.C3,2],[N.G3,2],[N.G3,4],
    [N.Ab3,2],[N.Bb3,2],[N.F3,2],[N.F3,2],
    [N.G3,2],[N.G3,2],[N.C3,4],
  ];

  function _schedLoop() {
    if (!themeActive || muted) return;
    const a = _ac();
    const bd = 60 / _bpm;
    const t0 = a.currentTime + 0.04;
    const dur = _seq(MEL, t0, bd, 0.17, 'square');
    _seq(BAS, t0, bd, 0.09, 'triangle');
    themeTimer = setTimeout(_schedLoop, (dur - 0.06) * 1000);
  }

  function startTheme() {
    stopTheme();
    themeActive = true;
    _schedLoop();
  }

  function stopTheme() {
    themeActive = false;
    if (themeTimer) { clearTimeout(themeTimer); themeTimer = null; }
  }

  // BPM scala con velocità di gioco: 3.5→165, 6→190, 9→220
  function setBPM(gameSpd) {
    _bpm = Math.max(165, Math.min(260, 130 + gameSpd * 10));
  }

  // --- Jingle verdura: arpeggio ascendente allegro ---
  function vegJingle() {
    if (muted) return;
    const a = _ac(), t = a.currentTime;
    [[N.C5,0],[N.E5,0.07],[N.G5,0.14],[N.C6,0.21]].forEach(([f, dt]) =>
      _tone(f, t + dt, 0.15, 0.22, 'square'));
    _tone(N.C6 * 1.5, t + 0.32, 0.09, 0.07, 'sine');
  }

  // --- Vita persa: discesa cromatica drammatica ---
  function lifeLost() {
    if (muted) return;
    const a = _ac(), t = a.currentTime;
    [N.B4, N.Bb4, N.A4, N.Ab4, N.G4, N.F4, N.E4, N.Eb4]
      .forEach((f, i) => _tone(f, t + i * 0.075, 0.11, 0.17, 'sawtooth'));
    _tone(N.Bb2, t + 0.6, 0.55, 0.28, 'square');
  }

  // --- Game Over: Marcia Funebre Chopin Op.35 in 8-bit (Bb minore) ---
  function funeralMarch() {
    if (muted) return;
    stopTheme();
    const a = _ac(), t0 = a.currentTime + 0.5;
    const q = 60 / 60;           // quarto a 60 BPM = 1 secondo
    const e = q / 2, h = q * 2, dq = q * 1.5;

    // Melodia principale
    const mel = [
      [N.Bb3, e],                                               // pickup
      [N.Bb3,e],[N.Bb3,e],[N.F3,q],[N.Eb3,dq],[N.R,e],        // frase 1
      [N.Eb3,e],[N.Eb3,e],[N.Bb2,q],[N.Ab3,dq],[N.R,e],       // frase 2
      [N.Ab3,e],[N.Ab3,e],[N.Eb3,q],[N.Db3,dq],[N.R,e],       // frase 3
      [N.Bb3,e],[N.Bb3,e],[N.F3,q],[N.Eb3,h],[N.R,q],         // frase 4 (cadenza)
      // Trio (più luminoso, Db maggiore)
      [N.Eb4,dq],[N.F4,e],[N.Eb4,q],[N.Db4,q],
      [N.Bb3,h],[N.Eb4,q],[N.R,q],
      [N.Db4,dq],[N.Eb4,e],[N.Db4,q],[N.Bb3,q],
      [N.Ab3,h+q],[N.R,q],
      // Da Capo
      [N.Bb3,e],[N.Bb3,e],[N.F3,q],[N.Eb3,dq],[N.R,e],
      [N.Eb3,e],[N.Eb3,e],[N.Bb2,q],[N.Ab3,dq],[N.R,e],
      [N.Bb3,e],[N.Bb3,e],[N.F3,q],[N.Eb3,h+q],
    ];

    // Basso / accompagnamento
    const bas = [
      [N.R, e],
      [N.Bb2,q],[N.Bb2,q],[N.Bb2,q],[N.Bb2,q],
      [N.Eb3,q],[N.Eb3,q],[N.Eb3,q],[N.Eb3,q],
      [N.Ab3,q],[N.Ab3,q],[N.Ab3,q],[N.Ab3,q],
      [N.Bb2,q],[N.Bb2,q],[N.Bb2,q],[N.Bb2,h+q],
      // Trio basso
      [N.Ab3,q],[N.Ab3,q],[N.Gb3,q],[N.Gb3,q],
      [N.Eb3,q],[N.Eb3,q],[N.F3,q],[N.R,q],
      [N.Db3,q],[N.Db3,q],[N.Eb3,q],[N.Eb3,q],
      [N.Ab3,q],[N.Ab3,q],[N.R,h+q],
      // Da Capo basso
      [N.Bb2,q],[N.Bb2,q],[N.Bb2,q],[N.Bb2,q],
      [N.Eb3,q],[N.Eb3,q],[N.Eb3,q],[N.Eb3,q],
      [N.Bb2,q],[N.Bb2,q],[N.Bb2,h+q],
    ];

    _seq(mel, t0, 1, 0.22, 'square');
    _seq(bas, t0, 1, 0.11, 'triangle');
  }

  function toggleMute() {
    muted = !muted;
    if (_master) _master.gain.value = muted ? 0 : 0.28;
    if (muted) stopTheme();
    return muted;
  }

  return { startTheme, stopTheme, setBPM, vegJingle, lifeLost, funeralMarch, toggleMute };
})();

// Pulsante muto
document.getElementById('mute-btn').addEventListener('click', e => {
  e.stopPropagation();
  const m = VVAudio.toggleMute();
  e.currentTarget.textContent = m ? '🔇' : '🔊';
});

// --- Raptor ---
const R = { x:100, y:GND-PH, vy:0, jumping:false, duck:false };
const rTop = () => R.duck ? GND-DH   : R.y;
const rH   = () => R.duck ? DH       : PH;
// Box collisione (leggermente inset)
const rBox = () => ({ x:R.x+6, y:rTop()+6, w:PW-12, h:rH()-12 });

// --- Dati ostacoli: [emoji, isAlto, messaggio] ---
// isAlto=true => vola in aria (abbassati), false => a terra (salta)
const MOBS = [
  ['🥩', false, "NOOO! LA BISTECCA!"],
  ['🌭', false, "NOOO! L'HOT DOG!"],
  ['🍗', true,  "NOOO! IL POLLO!"],
  ['🥚', false, "NOOO! LE UOVA!"],
  ['🧀', false, "NOOO! IL FORMAGGIO!"],
  ['🥛', false, "NOOO! IL LATTE!"],
  ['🍖', true,  "NOOO! LA BRACIOLA!"],
];

// --- Dati raccoglibili: [emoji, messaggio, punti] ---
const VEGE = [
  ['🥦', 'BROCCOLO POWER!',  10],
  ['🥕', 'CAROTA BOOST!',     8],
  ['🥗', 'INSALATA FRESCA!',  6],
  ['🍵', 'TOFU TIME!',       12],
  ['🌿', 'CARCIOFO ENERGY!',  9],
];

// --- Input ---
function doJump() {
  if (!R.jumping && state === 'play') { R.vy = JUMP_VY; R.jumping = true; }
}
function startGame() {
  state = 'play'; score = 0; lives = 3; level = 1; spd = SPD_MIN; spdMod = 0;
  frame = 0; levelScore = 0; levelTimer = 0;
  objs = []; coins = []; msg = null; msgTimer = 0;
  R.y = GND-PH; R.vy = 0; R.jumping = false; R.duck = false;
  nextObj = 80; nextVeg = 70;
  VVAudio.setBPM(SPD_MIN);
  VVAudio.startTheme();
}

window.addEventListener('keydown', e => {
  if (state === 'play') {
    if (e.code === 'ArrowUp' || e.code === 'Space') { e.preventDefault(); doJump(); }
    if (e.code === 'ArrowDown') { e.preventDefault(); R.duck = true; }
  } else if (e.code === 'Enter' || e.code === 'Space') startGame();
});
window.addEventListener('keyup', e => { if (e.code === 'ArrowDown') R.duck = false; });

c.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (state === 'play') {
    // Split al centro del canvas (non della finestra intera)
    const rect = c.getBoundingClientRect();
    if (t.clientY < rect.top + rect.height / 2) doJump(); else R.duck = true;
  } else if (state === 'gameover') {
    handleClick(t.clientX, t.clientY);
  } else startGame();
}, { passive: false });
c.addEventListener('touchend', e => { e.preventDefault(); R.duck = false; }, { passive: false });
c.addEventListener('click', e => { if (state === 'gameover') handleClick(e.clientX, e.clientY); });

function handleClick(cx_, cy_) {
  const rect = c.getBoundingClientRect();
  const mx = (cx_ - rect.left) * (c.width  / rect.width);
  const my = (cy_ - rect.top)  * (c.height / rect.height);
  if (mx>215 && mx<375 && my>215 && my<262) startGame();
  if (mx>425 && mx<615 && my>215 && my<262) { state = 'menu'; frame = 0; VVAudio.stopTheme(); }
}

// --- Helpers canvas ---
function rr(x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r, y); cx.arcTo(x+w, y, x+w, y+h, r); cx.arcTo(x+w, y+h, x, y+h, r);
  cx.arcTo(x, y+h, x, y, r); cx.arcTo(x, y, x+w, y, r); cx.closePath();
}
function btn(x, y, w, h, txt, bg) {
  cx.fillStyle = bg; rr(x, y, w, h, 10); cx.fill();
  cx.fillStyle = 'white'; cx.font = 'bold 17px sans-serif'; cx.textAlign = 'center';
  cx.fillText(txt, x + w/2, y + h*0.64);
}
function speechBubble(x, y, txt, col) {
  cx.font = 'bold 14px sans-serif';
  const bw = Math.max(cx.measureText(txt).width + 24, 180), bh = 38;
  cx.fillStyle = 'white'; cx.strokeStyle = '#333'; cx.lineWidth = 2;
  rr(x, y, bw, bh, 8); cx.fill(); cx.stroke();
  cx.beginPath();
  cx.moveTo(x+14, y+bh); cx.lineTo(x+6, y+bh+13); cx.lineTo(x+26, y+bh);
  cx.closePath(); cx.fillStyle = 'white'; cx.fill(); cx.stroke();
  cx.fillStyle = col; cx.textAlign = 'left';
  cx.fillText(txt, x + 12, y + bh - 10);
}

// --- Disegna raptor ---
// Uso x,y,duck come parametri per riusarlo nel menu/lvlend
function drawRaptor(rx, ry, duck) {
  const G = '#5D8A3C', DG = '#3a6a1f';
  cx.save();
  if (duck) {
    const dy = GND - DH;
    cx.fillStyle = G;
    // Coda
    cx.beginPath(); cx.moveTo(rx+2,dy+18); cx.lineTo(rx-18,dy+8); cx.lineTo(rx+4,dy+24); cx.closePath(); cx.fill();
    // Corpo
    cx.beginPath(); cx.ellipse(rx+22, dy+17, 24, 13, 0, 0, Math.PI*2); cx.fill();
    // Testa
    cx.beginPath(); cx.ellipse(rx+43, dy+9, 12, 9, 0.4, 0, Math.PI*2); cx.fill();
    // Occhio
    cx.fillStyle = 'white'; cx.beginPath(); cx.arc(rx+47, dy+6, 4, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#111';  cx.beginPath(); cx.arc(rx+48, dy+6, 2, 0, Math.PI*2); cx.fill();
    // Gambe
    const lg = Math.sin(frame*0.3) * 7;
    cx.strokeStyle = DG; cx.lineWidth = 4;
    cx.beginPath(); cx.moveTo(rx+16, dy+28); cx.lineTo(rx+14+lg, GND); cx.stroke();
    cx.beginPath(); cx.moveTo(rx+28, dy+28); cx.lineTo(rx+30-lg, GND); cx.stroke();
  } else {
    // Coda
    cx.fillStyle = G;
    cx.beginPath(); cx.moveTo(rx+5,ry+PH*.60); cx.lineTo(rx-20,ry+PH*.35); cx.lineTo(rx+3,ry+PH*.72); cx.closePath(); cx.fill();
    // Corpo
    cx.beginPath(); cx.ellipse(rx+20, ry+PH*.52, 14, 22, 0.15, 0, Math.PI*2); cx.fill();
    // Collo
    cx.beginPath(); cx.moveTo(rx+27,ry+PH*.28); cx.lineTo(rx+38,ry+PH*.12); cx.lineTo(rx+33,ry+PH*.3); cx.closePath(); cx.fill();
    // Testa
    cx.beginPath(); cx.ellipse(rx+40, ry+PH*.16, 12, 9, 0.3, 0, Math.PI*2); cx.fill();
    // Occhio
    cx.fillStyle = 'white'; cx.beginPath(); cx.arc(rx+45, ry+PH*.11, 4, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#111';  cx.beginPath(); cx.arc(rx+46, ry+PH*.11, 2, 0, Math.PI*2); cx.fill();
    // Sorriso
    cx.strokeStyle = DG; cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(rx+46, ry+PH*.22, 4, 0, Math.PI); cx.stroke();
    // Maglietta I❤TOFU
    cx.fillStyle = '#FF6B6B'; cx.fillRect(rx+9, ry+PH*.38, 20, 15);
    cx.fillStyle = 'white'; cx.font = 'bold 5px sans-serif'; cx.textAlign = 'center';
    cx.fillText('I❤TOFU', rx+19, ry+PH*.38+10);
    // Braccia
    cx.strokeStyle = G; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(rx+24, ry+PH*.43); cx.lineTo(rx+37, ry+PH*.50); cx.stroke();
    // Gambe animate
    const lg = Math.sin(frame*0.3) * (R.jumping ? 0 : 8);
    cx.strokeStyle = DG; cx.lineWidth = 5;
    cx.beginPath(); cx.moveTo(rx+18, ry+PH*.82); cx.lineTo(rx+20+lg, GND); cx.stroke();
    cx.beginPath(); cx.moveTo(rx+12, ry+PH*.82); cx.lineTo(rx+10-lg, GND); cx.stroke();
  }
  cx.restore();
}

// --- Sfondo ---
function drawBg() {
  const g = cx.createLinearGradient(0, 0, 0, GND);
  g.addColorStop(0, '#5BA3D0'); g.addColorStop(1, '#C8E8F5');
  cx.fillStyle = g; cx.fillRect(0, 0, 800, GND);

  // Nuvole parallax
  cx.fillStyle = 'rgba(255,255,255,0.85)';
  const clouds = [[80,55,70],[300,40,55],[560,65,80],[160,48,65],[440,72,88]];
  clouds.forEach(([bx, by, r], i) => {
    const x = ((bx + bgX * (i < 3 ? 0.3 : 0.18)) % 900 + 900) % 900;
    cx.beginPath(); cx.arc(x, by, r*0.5, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x+r*0.3, by-r*0.2, r*0.35, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x-r*0.28, by+r*0.05, r*0.3, 0, Math.PI*2); cx.fill();
  });

  // Prato
  cx.fillStyle = '#4CAF50'; cx.fillRect(0, GND, 800, 400-GND);
  cx.fillStyle = '#388E3C'; cx.fillRect(0, GND, 800, 8);
  // Strisce sull'erba
  cx.fillStyle = '#45a049';
  for (let i = 0; i < 9; i++) {
    const sx = ((frame * spd * 0.6 + i * 105) % 840) - 20;
    cx.fillRect(sx, GND+8, 65, 5);
  }
}

// --- HUD ---
function drawHUD() {
  cx.fillStyle = 'rgba(0,0,0,0.45)'; cx.fillRect(0, 0, 800, 38);
  // Cuori: fino a MAX_LIVES=5
  cx.font = '16px serif'; cx.textAlign = 'left';
  cx.fillText('❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, MAX_LIVES - lives)), 8, 27);
  // Centro: livello + indicatore velocità
  cx.fillStyle = 'white'; cx.font = 'bold 15px sans-serif'; cx.textAlign = 'center';
  const spdBar = spdMod > 0 ? ' 🔥'.repeat(Math.min(3, Math.ceil(spdMod / 0.5))) : ' ✅';
  cx.fillText('Liv. ' + level + spdBar, 400, 26);
  // Destra: punti
  cx.textAlign = 'right';
  cx.fillText('Punti: ' + score + '  |  Best: ' + hiScore, 792, 26);
}

// --- Zone tocco (visibili solo su touch device) ---
function drawTouchZones() {
  // Mostra solo se è un dispositivo touch (rilevato dal primo tocco)
  if (!window._hasTouched) return;
  cx.save();
  cx.globalAlpha = 0.10;
  // Zona superiore = salta
  cx.fillStyle = '#00ff88';
  cx.fillRect(0, 38, 800, 162);
  // Zona inferiore = abbassati
  cx.fillStyle = '#ff6644';
  cx.fillRect(0, 200, 800, 200);
  cx.globalAlpha = 0.55;
  cx.font = 'bold 15px sans-serif'; cx.textAlign = 'left'; cx.fillStyle = '#006633';
  cx.fillText('👆 TAP = SALTA', 10, 58);
  cx.fillStyle = '#aa2200';
  cx.fillText('👇 TAP = ABBASSATI', 10, 390);
  cx.restore();
}

// Segna che è un device touch al primo tocco
window.addEventListener('touchstart', () => { window._hasTouched = true; }, { once: true, passive: true });

// --- Update ---
function update() {
  bgX -= 0.5;
  if (msg) { if (--msgTimer <= 0) msg = null; }
  if (state !== 'play') return;

  // Fisica raptor
  R.vy += GRAVITY;
  R.y  += R.vy;
  if (R.y >= GND - PH) { R.y = GND - PH; R.vy = 0; R.jumping = false; }

  // Spawn ostacoli
  if (--nextObj <= 0) {
    const m = MOBS[Math.floor(Math.random() * MOBS.length)];
    const isHigh = m[1];
    objs.push({
      emoji: m[0], msg: m[2], x: 820,
      // Alto: da 245 a 305 (box 60px) — a terra: da 300 a 340 (box 40px)
      y: isHigh ? GND-95 : GND-40, h: isHigh ? 60 : 40, w: 40
    });
    nextObj = Math.max(32, 90 - level*4) + Math.floor(Math.random() * 28);
  }

  // Spawn raccoglibili
  if (--nextVeg <= 0) {
    const v = VEGE[Math.floor(Math.random() * VEGE.length)];
    coins.push({
      emoji: v[0], msg: v[1], pts: v[2],
      x: 820, y: GND - 72 - Math.random()*30, h: 35, w: 35
    });
    nextVeg = Math.max(45, 110 - level*4) + Math.floor(Math.random() * 38);
  }

  const ov = (a, b) => a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  const rb = rBox();

  // Aggiorna ostacoli
  objs = objs.filter(o => {
    o.x -= spd;
    if (ov(rb, o)) {
      lives--;
      spdMod += 0.5;   // più veloce ad ogni vita persa
      msg = o.msg; msgTimer = 100;
      VVAudio.lifeLost();
      if (lives <= 0) {
        state = 'gameover';
        if (score > hiScore) { hiScore = score; localStorage.setItem('vegaRapHi', hiScore); }
        VVAudio.funeralMarch();
      }
      return false;
    }
    return o.x > -60;
  });

  // Aggiorna raccoglibili
  coins = coins.filter(v => {
    v.x -= spd;
    if (ov(rb, v)) {
      score += v.pts; levelScore += v.pts;
      lives = Math.min(MAX_LIVES, lives + 1);  // vita extra (max 5)
      spdMod = Math.max(0, spdMod - 0.3);      // rallenta (non scende sotto SPD_MIN)
      msg = v.msg + ' +❤️'; msgTimer = 75;
      VVAudio.vegJingle();
      return false;
    }
    return v.x > -50;
  });

  // Punti passivi ogni 30 frame
  if (frame % 30 === 0) { score++; levelScore++; }

  // Velocità: base per livello + penalità accumulate - bonus verdure (mai sotto SPD_MIN)
  spd = SPD_MIN + level * 0.4 + spdMod;

  // Aggiorna BPM del tema con la velocità corrente (ogni 60 frame)
  if (frame % 60 === 0) VVAudio.setBPM(spd);

  // Cambio livello
  if (levelScore >= 200 + level * 60) {
    state = 'lvlend'; levelTimer = 185; levelScore = 0;
    objs = []; coins = [];
  }
}

// --- Schermate ---
function drawMenu() {
  drawBg();
  drawRaptor(355, GND-PH, false);

  cx.fillStyle = 'rgba(255,255,255,0.90)';
  rr(150, 55, 500, 235, 18); cx.fill();

  cx.fillStyle = '#2d5a1b'; cx.font = 'bold 40px sans-serif'; cx.textAlign = 'center';
  cx.fillText('🦕 VEGAN VELOCIRAPTOR', 400, 115);
  cx.fillStyle = '#FF6B6B'; cx.font = 'bold 17px sans-serif';
  cx.fillText('"Tofu o non essere!"', 400, 145);
  cx.fillStyle = '#444'; cx.font = '14px sans-serif';
  if (window._hasTouched) {
    cx.fillText('👆 Tap in alto = Salta   •   👇 Tap in basso = Abbassati', 400, 174);
  } else {
    cx.fillText('⬆ / Spazio = Salta   •   ⬇ = Abbassati', 400, 174);
  }
  cx.fillText('Raccogli verdure, evita la carne!', 400, 196);
  cx.fillStyle = '#666'; cx.fillText('Record: ' + hiScore, 400, 218);

  if (Math.floor(frame / 22) % 2 === 0) {
    cx.fillStyle = '#2d5a1b'; cx.font = 'bold 19px sans-serif';
    const startMsg = window._hasTouched ? '▶  TOCCA PER INIZIARE  ◀' : '▶  PREMI SPAZIO O TOCCA PER INIZIARE  ◀';
    cx.fillText(startMsg, 400, 260);
  }
}

function drawLevelEnd() {
  drawBg();
  const bounce = Math.abs(Math.sin(levelTimer * 0.07)) * 55;
  drawRaptor(R.x, GND - PH - bounce, false);

  cx.fillStyle = '#FFD700'; cx.strokeStyle = '#FF8C00'; cx.lineWidth = 4;
  rr(245, 85, 310, 115, 16); cx.fill(); cx.stroke();
  cx.fillStyle = '#1a5c0a'; cx.font = 'bold 40px sans-serif'; cx.textAlign = 'center';
  cx.fillText('🌿 GO VEG! 🌿', 400, 146);
  cx.fillStyle = '#444'; cx.font = 'bold 17px sans-serif';
  cx.fillText('Livello ' + level + ' completato!', 400, 175);
  cx.font = '15px sans-serif';
  cx.fillText('Punti: ' + score, 400, 198);
}

function drawGameOver() {
  drawBg();
  drawRaptor(R.x, GND-PH, false);

  cx.fillStyle = 'white'; cx.strokeStyle = '#c00'; cx.lineWidth = 3;
  rr(75, 48, 650, 125, 16); cx.fill(); cx.stroke();
  // Fumetto parlante
  cx.fillStyle = '#c00'; cx.font = 'bold 18px sans-serif'; cx.textAlign = 'center';
  cx.fillText('"Ho confuso il tofu col tufo:', 400, 93);
  cx.fillText('ora non ho più i denti"', 400, 120);
  cx.fillStyle = '#333'; cx.font = '16px sans-serif';
  cx.fillText('Punti: ' + score + '   |   Record: ' + hiScore, 400, 155);
  if (score > 0 && score >= hiScore) {
    cx.fillStyle = '#c8860a'; cx.font = 'bold 17px sans-serif';
    cx.fillText('🏆 NUOVO RECORD! 🏆', 400, 178);
  }
  btn(215, 215, 160, 47, 'Riprova', '#4CAF50');
  btn(425, 215, 190, 47, 'Menu principale', '#2196F3');
}

// --- Loop principale ---
function loop() {
  requestAnimationFrame(loop);
  frame++;
  update();

  if (state === 'menu') {
    drawMenu();
    return;
  }

  if (state === 'play') {
    drawBg();
    drawTouchZones();
    cx.font = '34px serif'; cx.textAlign = 'left';
    [...objs, ...coins].forEach(o => cx.fillText(o.emoji, o.x, o.y + o.h));
    drawRaptor(R.x, R.duck ? GND-DH : R.y, R.duck);
    drawHUD();
    if (msg) {
      const alpha = Math.min(1, msgTimer / 18);
      cx.save(); cx.globalAlpha = alpha;
      speechBubble(R.x + 55, rTop() - 60, msg, msg.startsWith('NOOO') ? '#c00' : '#1a7a0f');
      cx.restore();
    }
    return;
  }

  if (state === 'lvlend') {
    if (--levelTimer <= 0) { level++; state = 'play'; nextObj = 80; nextVeg = 70; }
    drawLevelEnd();
    drawHUD();
    return;
  }

  if (state === 'gameover') {
    drawGameOver();
    return;
  }
}

loop();
</script>
